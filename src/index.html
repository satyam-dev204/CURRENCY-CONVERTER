<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency CONVERTER</title>
  <link href="./output.css" rel="stylesheet">
  <link href="../input.css" rel="stylesheet">
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"

</head>
<body class="flex justify-center items-center">
  <form class=" p-7 rounded-md">
    <header class="flex justify-center bg-neutral-600 rounded-lg p-1 mb-5">
        <h1 class="font-semibold text-2xl text-white">CURRENCY CONVERTER</h1>
    </header>
    <div class="input mb-2.5 font-medium">
        <p>Enter Amount</p>
        <input class="border-2 outline-none border-gray-700 rounded-md w-full" type="1" value="1">
    </div>
    <div class="country flex justify-between items-center mb-2.5 font-medium">
        <div class="from">
            <p>From</p>
            <div>
                <img src="https://flagsapi.com/US/flat/64.png" />
                <select class="border-2 outline-none border-gray-700 rounded-md w-full" name="from">
                    
                </select>
            </div>
        </div>
        <i class="fa-solid fa-arrow-right-arrow-left text-4xl"></i>
        <div class="to">
            <p>To</p>
            <div>
                <img src="https://flagsapi.com/IN/flat/64.png" />
                <select class="border-2 outline-none border-gray-700 rounded-md w-full" name="to">
                </select>
            </div>
        </div>
    </div>
    <div class="output mb-2.5 font-medium text-center">
        <p class="output text-2xl mb-2.5">1 USD=92.58 INR</p>
        <button>
            Get Exchange Rate
        </button>
    </div>
  </form>
  <script src="./code.js"></script>
  <script src="./first.js"></script>
</body>
</html>
